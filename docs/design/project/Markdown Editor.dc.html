<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body { font-family: "Pretendard Variable", Pretendard, -apple-system, sans-serif; }
@keyframes toastIn { from { opacity: 0; transform: translate(-50%, 12px); } to { opacity: 1; transform: translate(-50%, 0); } }
.md-preview { color: #2b3440; font-size: 15.5px; line-height: 1.78; letter-spacing: -0.003em; }
.md-preview > *:first-child { margin-top: 0; }
.md-preview h1 { font-size: 30px; font-weight: 800; letter-spacing: -0.02em; color: #141b2b; margin: 0 0 18px; padding-bottom: 14px; border-bottom: 2px solid #eef1f6; line-height: 1.3; }
.md-preview h2 { font-size: 21px; font-weight: 700; letter-spacing: -0.015em; color: #1c2434; margin: 38px 0 14px; }
.md-preview h3 { font-size: 17px; font-weight: 700; color: #29313f; margin: 26px 0 10px; }
.md-preview p { margin: 0 0 14px; }
.md-preview a { color: #3b5bdb; text-decoration: none; border-bottom: 1px solid #c5d0f5; padding-bottom: 1px; transition: border-color .15s, color .15s; }
.md-preview a:hover { color: #2843b8; border-color: #3b5bdb; }
.md-preview strong { font-weight: 700; color: #1c2434; }
.md-preview em { font-style: italic; }
.md-preview del { color: #94a3b8; }
.md-preview ol, .md-preview ul { margin: 0 0 16px; padding-left: 24px; }
.md-preview li { margin: 5px 0; }
.md-preview li::marker { color: #8a93a6; }
.md-preview blockquote { margin: 0 0 18px; padding: 12px 18px; background: #f5f7ff; border-left: 3px solid #3b5bdb; border-radius: 0 8px 8px 0; color: #4a5878; font-size: 14.5px; }
.md-preview blockquote p:last-child { margin: 0; }
.md-preview hr { border: 0; border-top: 1px solid #e8ecf3; margin: 30px 0; }
.md-preview code { font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 0.86em; background: #eef1f8; color: #3a4cb0; padding: 2px 6px; border-radius: 5px; font-weight: 500; }
.md-preview pre { background: #1a2030; color: #e6eaf2; padding: 18px 20px; border-radius: 10px; overflow-x: auto; margin: 0 0 18px; }
.md-preview pre code { background: none; color: inherit; padding: 0; font-size: 13.5px; }
.md-preview table { border-collapse: collapse; width: 100%; margin: 0 0 20px; font-size: 14.5px; overflow: hidden; border-radius: 10px; box-shadow: 0 0 0 1px #e6eaf2; }
.md-preview thead th { background: #f6f8fc; color: #2a3346; font-weight: 700; text-align: left; padding: 11px 16px; border-bottom: 1px solid #e6eaf2; }
.md-preview tbody td { padding: 10px 16px; border-bottom: 1px solid #eef1f6; }
.md-preview tbody tr:last-child td { border-bottom: 0; }
.md-preview tbody tr:nth-child(even) { background: #fafbfd; }
.md-preview tbody td:first-child { white-space: nowrap; }
.tatext::placeholder { color: #b3bccb; }
.md-preview::-webkit-scrollbar, .tatext::-webkit-scrollbar { width: 10px; }
.md-preview::-webkit-scrollbar-thumb, .tatext::-webkit-scrollbar-thumb { background: #d7deea; border-radius: 6px; border: 3px solid transparent; background-clip: content-box; }
</style>
</helmet>

<div style="height: 100vh; display: flex; flex-direction: column; background: #ffffff; color: #1c2434; overflow: hidden;">

  <div style="display: flex; align-items: center; gap: 14px; padding: 11px 18px; border-bottom: 1px solid #eaedf3; background: #ffffff; flex: none;">
    <div style="display: flex; align-items: center; gap: 9px; margin-right: 4px;">
      <div style="width: 26px; height: 26px; border-radius: 7px; background: linear-gradient(135deg, #3b5bdb, #5b73e8); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 14px; font-family: 'JetBrains Mono', monospace;">M</div>
      <span style="font-weight: 700; font-size: 14.5px; letter-spacing: -0.01em; color: #2a3346;">Markdown Editor</span>
    </div>

    <div style="display: flex; align-items: center; gap: 2px; flex-wrap: wrap;">
      <button type="button" title="제목 (Heading)" onClick="{{ cmds.heading }}" style="width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; border: none; background: transparent; border-radius: 8px; color: #4a5568; cursor: pointer; padding: 0;" style-hover="background: #f1f3f9; color: #1f2a44;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4v16M18 4v16M6 12h12"/></svg></button>
      <button type="button" title="굵게 (Bold)" onClick="{{ cmds.bold }}" style="width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; border: none; background: transparent; border-radius: 8px; color: #4a5568; cursor: pointer; padding: 0;" style-hover="background: #f1f3f9; color: #1f2a44;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 5h6a3.5 3.5 0 0 1 0 7H7zM7 12h7a3.5 3.5 0 0 1 0 7H7z"/></svg></button>
      <button type="button" title="기울임 (Italic)" onClick="{{ cmds.italic }}" style="width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; border: none; background: transparent; border-radius: 8px; color: #4a5568; cursor: pointer; padding: 0;" style-hover="background: #f1f3f9; color: #1f2a44;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M19 5h-6M11 19H5M15 5l-6 14"/></svg></button>
      <button type="button" title="취소선 (Strikethrough)" onClick="{{ cmds.strike }}" style="width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; border: none; background: transparent; border-radius: 8px; color: #4a5568; cursor: pointer; padding: 0;" style-hover="background: #f1f3f9; color: #1f2a44;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h16M16 6.5C16 5 14 4 12 4S8 5 8 7s2 2.5 4 3M8 17.5c0 1.5 2 2.5 4 2.5s4-1 4-3"/></svg></button>

      <span style="width: 1px; height: 20px; background: #e7ebf2; margin: 0 5px;"></span>

      <button type="button" title="인용 (Quote)" onClick="{{ cmds.quote }}" style="width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; border: none; background: transparent; border-radius: 8px; color: #4a5568; cursor: pointer; padding: 0;" style-hover="background: #f1f3f9; color: #1f2a44;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7H4v5h3c0 2-1 3-3 3.5M17 7h-3v5h3c0 2-1 3-3 3.5"/></svg></button>
      <button type="button" title="인라인 코드 (Code)" onClick="{{ cmds.code }}" style="width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; border: none; background: transparent; border-radius: 8px; color: #4a5568; cursor: pointer; padding: 0;" style-hover="background: #f1f3f9; color: #1f2a44;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M16 18l5-6-5-6M8 6l-5 6 5 6"/></svg></button>
      <button type="button" title="코드 블록 (Code block)" onClick="{{ cmds.codeblock }}" style="width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; border: none; background: transparent; border-radius: 8px; color: #4a5568; cursor: pointer; padding: 0;" style-hover="background: #f1f3f9; color: #1f2a44;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2.5"/><path d="M8 10l2.5 2L8 14M13 14h3"/></svg></button>
      <button type="button" title="링크 (Link)" onClick="{{ cmds.link }}" style="width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; border: none; background: transparent; border-radius: 8px; color: #4a5568; cursor: pointer; padding: 0;" style-hover="background: #f1f3f9; color: #1f2a44;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l2-2a5 5 0 0 0-7-7l-1 1M14 11a5 5 0 0 0-7 0l-2 2a5 5 0 0 0 7 7l1-1"/></svg></button>

      <span style="width: 1px; height: 20px; background: #e7ebf2; margin: 0 5px;"></span>

      <button type="button" title="글머리 목록 (Bullet list)" onClick="{{ cmds.ul }}" style="width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; border: none; background: transparent; border-radius: 8px; color: #4a5568; cursor: pointer; padding: 0;" style-hover="background: #f1f3f9; color: #1f2a44;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6h12M9 12h12M9 18h12M4 6h.01M4 12h.01M4 18h.01"/></svg></button>
      <button type="button" title="번호 목록 (Ordered list)" onClick="{{ cmds.ol }}" style="width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; border: none; background: transparent; border-radius: 8px; color: #4a5568; cursor: pointer; padding: 0;" style-hover="background: #f1f3f9; color: #1f2a44;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M10 6h11M10 12h11M10 18h11M4 5h1v4M4 9h2M6 18H4c0-1.2 2-1.5 2-2.8C6 14.4 5 14 4 14.6"/></svg></button>
      <button type="button" title="표 (Table)" onClick="{{ cmds.table }}" style="width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; border: none; background: transparent; border-radius: 8px; color: #4a5568; cursor: pointer; padding: 0;" style-hover="background: #f1f3f9; color: #1f2a44;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2.5"/><path d="M3 10h18M9 4v16"/></svg></button>
      <button type="button" title="구분선 (Divider)" onClick="{{ cmds.hr }}" style="width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; border: none; background: transparent; border-radius: 8px; color: #4a5568; cursor: pointer; padding: 0;" style-hover="background: #f1f3f9; color: #1f2a44;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h16"/></svg></button>
    </div>
  </div>

  <div style="flex: 1; display: flex; min-height: 0;">

    <div style="flex: 1; display: flex; flex-direction: column; min-width: 0; background: #fbfcfe; border-right: 1px solid #eaedf3;">
      <div style="display: flex; align-items: center; gap: 8px; padding: 9px 22px; border-bottom: 1px solid #eef1f6; flex: none;">
        <span style="width: 7px; height: 7px; border-radius: 50%; background: #3b5bdb;"></span>
        <span style="font-size: 11px; font-weight: 700; letter-spacing: 0.09em; color: #99a2b3;">MARKDOWN</span>
      </div>
      <textarea class="tatext" ref="{{ taRef }}" value="{{ md }}" onChange="{{ onChange }}" spellcheck="false" placeholder="여기에 마크다운을 입력하세요…" style="flex: 1; width: 100%; resize: none; border: none; outline: none; background: transparent; padding: 24px 26px 40px; font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 13.5px; line-height: 1.85; color: #3a4458; tab-size: 2;"></textarea>
    </div>

    <div style="flex: 1; display: flex; flex-direction: column; min-width: 0; background: #ffffff;">
      <div style="display: flex; align-items: center; gap: 8px; padding: 9px 22px; border-bottom: 1px solid #eef1f6; flex: none;">
        <span style="width: 7px; height: 7px; border-radius: 50%; background: #2bb673;"></span>
        <span style="font-size: 11px; font-weight: 700; letter-spacing: 0.09em; color: #99a2b3;">미리보기</span>
      </div>
      <div class="md-preview" style="flex: 1; overflow-y: auto; padding: 30px 40px 60px;">{{ previewEl }}</div>
    </div>

  </div>

  <div style="display: flex; align-items: center; justify-content: space-between; padding: 13px 20px; border-top: 1px solid #eaedf3; background: #ffffff; flex: none;">
    <div style="display: flex; align-items: center; gap: 16px; font-size: 12.5px; color: #98a1b2;">
      <span>{{ charCount }}자</span>
      <span style="width: 1px; height: 13px; background: #e3e8f0;"></span>
      <span>{{ lineCount }}줄</span>
    </div>
    <div style="display: flex; align-items: center; gap: 10px;">
      <button type="button" onClick="{{ onCancel }}" style="height: 38px; padding: 0 20px; border: 1px solid #dfe4ec; background: #fff; color: #5a6577; border-radius: 9px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;" style-hover="background: #f6f8fb; border-color: #cdd5e0;">취소</button>
      <button type="button" onClick="{{ onSave }}" style="height: 38px; padding: 0 24px; border: none; background: #3b5bdb; color: #fff; border-radius: 9px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; box-shadow: 0 2px 8px rgba(59,91,219,0.28); display: inline-flex; align-items: center; gap: 7px;" style-hover="background: #2f4ec4;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>저장</button>
    </div>
  </div>

  <sc-if value="{{ toast }}" hint-placeholder-val="">
    <div style="position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%); background: #1c2434; color: #fff; padding: 11px 20px; border-radius: 10px; font-size: 13.5px; font-weight: 600; box-shadow: 0 8px 28px rgba(20,27,43,0.32); animation: toastIn .22s ease; display: flex; align-items: center; gap: 9px;">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#5be3a3" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
      {{ toast }}
    </div>
  </sc-if>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.taRef = React.createRef();
    this.state = { md: SAMPLE_MD, toast: "" };
    this.lastSaved = SAMPLE_MD;
    this.pendingSel = null;
  }

  componentDidMount() {
    try {
      const saved = localStorage.getItem("mdeditor:v1");
      if (saved != null) {
        this.lastSaved = saved;
        this.setState({ md: saved });
      }
    } catch (e) {}
  }

  componentDidUpdate() {
    if (this.pendingSel && this.taRef.current) {
      const ta = this.taRef.current;
      ta.focus();
      ta.setSelectionRange(this.pendingSel[0], this.pendingSel[1]);
      this.pendingSel = null;
    }
  }

  wrap(before, after, ph) {
    const ta = this.taRef.current; if (!ta) return;
    const v = ta.value, s = ta.selectionStart, e = ta.selectionEnd;
    const sel = v.slice(s, e) || ph;
    const nv = v.slice(0, s) + before + sel + after + v.slice(e);
    this.pendingSel = [s + before.length, s + before.length + sel.length];
    this.setState({ md: nv });
  }

  linePrefix(prefix) {
    const ta = this.taRef.current; if (!ta) return;
    const v = ta.value, s = ta.selectionStart, e = ta.selectionEnd;
    const ls = v.lastIndexOf("\n", s - 1) + 1;
    let le = v.indexOf("\n", e); if (le === -1) le = v.length;
    const block = v.slice(ls, le);
    const nb = block.split("\n").map(l => prefix + l).join("\n");
    const nv = v.slice(0, ls) + nb + v.slice(le);
    this.pendingSel = [ls, ls + nb.length];
    this.setState({ md: nv });
  }

  insertBlock(text) {
    const ta = this.taRef.current; if (!ta) return;
    const v = ta.value, s = ta.selectionStart, e = ta.selectionEnd;
    const nv = v.slice(0, s) + text + v.slice(e);
    this.pendingSel = [s + text.length, s + text.length];
    this.setState({ md: nv });
  }

  link() {
    const ta = this.taRef.current; if (!ta) return;
    const v = ta.value, s = ta.selectionStart, e = ta.selectionEnd;
    const sel = v.slice(s, e) || "링크 텍스트";
    const ins = "[" + sel + "](https://)";
    const nv = v.slice(0, s) + ins + v.slice(e);
    const urlPos = s + sel.length + 3;
    this.pendingSel = [urlPos, urlPos + 8];
    this.setState({ md: nv });
  }

  save() {
    try { localStorage.setItem("mdeditor:v1", this.state.md); } catch (e) {}
    this.lastSaved = this.state.md;
    this.flash("저장되었습니다");
  }

  cancel() {
    this.setState({ md: this.lastSaved });
    this.flash("마지막 저장 상태로 되돌렸습니다");
  }

  flash(msg) {
    this.setState({ toast: msg });
    clearTimeout(this._t);
    this._t = setTimeout(() => this.setState({ toast: "" }), 1900);
  }

  slug(t) {
    return t.toLowerCase().replace(/[.·]/g, "").replace(/\s+/g, "-").replace(/[^\w가-힣\-]/g, "");
  }

  inline(s) {
    s = s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    s = s.replace(/`([^`]+)`/g, (m, p) => "<code>" + p + "</code>");
    s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    s = s.replace(/~~([^~]+)~~/g, "<del>$1</del>");
    s = s.replace(/(^|[^*])\*([^*\s][^*]*?)\*/g, "$1<em>$2</em>");
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
    return s;
  }

  render_md(md) {
    const esc = s => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const lines = (md || "").replace(/\r/g, "").split("\n");
    let html = "", i = 0;
    const isSep = l => /^[\s|:\-]+$/.test(l) && l.includes("-") && l.includes("|");
    while (i < lines.length) {
      const line = lines[i];
      if (/^\s*---+\s*$/.test(line)) { html += "<hr/>"; i++; continue; }
      const h = line.match(/^(#{1,6})\s+(.*)$/);
      if (h) { const lv = h[1].length; const id = this.slug(h[2]); html += "<h" + lv + ' id="' + id + '">' + this.inline(h[2]) + "</h" + lv + ">"; i++; continue; }
      if (/^\s*>\s?/.test(line)) {
        const parts = [];
        while (i < lines.length && /^\s*>\s?/.test(lines[i])) { parts.push(lines[i].replace(/^\s*>\s?/, "")); i++; }
        html += "<blockquote>" + this.inline(parts.join(" ")) + "</blockquote>"; continue;
      }
      if (line.includes("|") && i + 1 < lines.length && isSep(lines[i + 1])) {
        const prow = r => r.trim().replace(/^\|/, "").replace(/\|$/, "").split("|").map(c => c.trim());
        const head = prow(line); i += 2;
        let body = "";
        while (i < lines.length && lines[i].includes("|") && lines[i].trim() !== "") {
          body += "<tr>" + prow(lines[i]).map(c => "<td>" + this.inline(c) + "</td>").join("") + "</tr>"; i++;
        }
        html += "<table><thead><tr>" + head.map(c => "<th>" + this.inline(c) + "</th>").join("") + "</tr></thead><tbody>" + body + "</tbody></table>"; continue;
      }
      if (/^```/.test(line)) {
        i++; const code = [];
        while (i < lines.length && !/^```/.test(lines[i])) { code.push(lines[i]); i++; }
        i++; html += "<pre><code>" + esc(code.join("\n")) + "</code></pre>"; continue;
      }
      if (/^\s*\d+\.\s+/.test(line)) {
        const it = [];
        while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) { it.push(lines[i].replace(/^\s*\d+\.\s+/, "")); i++; }
        html += "<ol>" + it.map(x => "<li>" + this.inline(x) + "</li>").join("") + "</ol>"; continue;
      }
      if (/^\s*[-*]\s+/.test(line)) {
        const it = [];
        while (i < lines.length && /^\s*[-*]\s+/.test(lines[i])) { it.push(lines[i].replace(/^\s*[-*]\s+/, "")); i++; }
        html += "<ul>" + it.map(x => "<li>" + this.inline(x) + "</li>").join("") + "</ul>"; continue;
      }
      if (line.trim() === "") { i++; continue; }
      const para = [];
      while (i < lines.length && lines[i].trim() !== "" && !/^\s*(#{1,6}\s|>|---+\s*$|\d+\.\s|[-*]\s|```)/.test(lines[i]) && !(lines[i].includes("|") && i + 1 < lines.length && isSep(lines[i + 1]))) {
        para.push(lines[i]); i++;
      }
      html += "<p>" + this.inline(para.join("<br/>")) + "</p>";
    }
    return html;
  }

  renderVals() {
    const md = this.state.md || "";
    return {
      md,
      taRef: this.taRef,
      toast: this.state.toast,
      charCount: md.length.toLocaleString(),
      lineCount: md.split("\n").length.toLocaleString(),
      onChange: e => this.setState({ md: e.target.value }),
      onSave: () => this.save(),
      onCancel: () => this.cancel(),
      previewEl: React.createElement("div", { dangerouslySetInnerHTML: { __html: this.render_md(md) } }),
      cmds: {
        heading: () => this.linePrefix("## "),
        bold: () => this.wrap("**", "**", "굵게"),
        italic: () => this.wrap("*", "*", "기울임"),
        strike: () => this.wrap("~~", "~~", "취소선"),
        quote: () => this.linePrefix("> "),
        code: () => this.wrap("`", "`", "코드"),
        codeblock: () => this.insertBlock("\n```\n코드\n```\n"),
        link: () => this.link(),
        ul: () => this.linePrefix("- "),
        ol: () => this.linePrefix("1. "),
        table: () => this.insertBlock("\n| 제목 | 설명 |\n|---|---|\n| 내용1 | 내용2 |\n"),
        hr: () => this.insertBlock("\n\n---\n\n")
      }
    };
  }
}
